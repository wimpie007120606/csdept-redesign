<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>University Computer Science Website</title>
    <script>
      (function() {
        var key = 'csdept-theme';
        var stored = localStorage.getItem(key);
        if (stored === 'maroon') {
          document.documentElement.classList.add('maroon');
        } else {
          document.documentElement.classList.remove('maroon');
        }
      })();
    </script>
    <style>
      /* Critical first-paint preloader — no flash of site content */
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #3a0c1a 0%, #21050f 45%, #140309 100%);
        overflow: hidden;
        transition: opacity 0.4s ease-out;
      }
      #preloader.preloader--hide {
        opacity: 0;
        pointer-events: none;
      }
      #preloader .preloader__inner {
        text-align: center;
        animation: preloader-glow 1.5s ease-out;
      }
      #preloader .preloader__logo {
        width: 100px;
        height: auto;
        display: block;
        margin: 0 auto 1rem;
        filter: drop-shadow(0 4px 20px rgba(200, 169, 81, 0.35));
      }
      #preloader .preloader__text {
        color: rgba(200, 169, 81, 0.9);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      @keyframes preloader-glow {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      @media (prefers-reduced-motion: reduce) {
        #preloader .preloader__inner { animation: none; }
        #preloader { transition: opacity 0.3s ease-out; }
      }
    </style>
  </head>
  <body>
    <div id="preloader" role="status" aria-label="Loading">
      <div class="preloader__inner">
        <img src="/brand/stellenbosch/su-logo-primary.jpeg" alt="" class="preloader__logo" width="100" height="100" />
        <p class="preloader__text">Computer Science Division</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        var el = document.getElementById('preloader');
        if (!el) return;
        document.body.style.overflow = 'hidden';
        var fadeMs = 400;
        var done = false;
        function removePreloader() {
          if (done) return;
          done = true;
          el.classList.add('preloader--hide');
          setTimeout(function() {
            if (el.parentNode) el.parentNode.removeChild(el);
            document.body.style.overflow = '';
          }, fadeMs);
        }
        setTimeout(removePreloader, 3000);
        setTimeout(function() {
          if (!done && el.parentNode) {
            done = true;
            el.parentNode.removeChild(el);
            document.body.style.overflow = '';
          }
        }, 8000);
      })();
    </script>
  </body>
</html>
