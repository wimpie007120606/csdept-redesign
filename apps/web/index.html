<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>University Computer Science Website</title>
    <script>
      (function() {
        var key = 'csdept-theme';
        var stored = localStorage.getItem(key);
        if (stored === 'maroon') {
          document.documentElement.classList.add('maroon');
        } else {
          document.documentElement.classList.remove('maroon');
        }
      })();
    </script>
    <style>
      /* Device-aware loading screen: iPhone & mobile phones = MacBook Air mockup; desktops = Mac Studio mockup */
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #3a0c1a 0%, #21050f 45%, #140309 100%);
        overflow: hidden;
        animation: ls-fadeIn 0.3s ease-out;
        transition: opacity 0.5s ease-in-out;
      }
      #loading-screen.loading-screen--hide {
        opacity: 0;
        pointer-events: none;
      }
      @keyframes ls-fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      /* iPhone & mobile phones: show MacBook Air (laptop) only; desktop: show Mac Studio only */
      #loading-screen.loading-screen--mobile .macstudio-loader { display: none !important; }
      #loading-screen.loading-screen--desktop .macbook-loader { display: none !important; }
      /* Desktop: subtle floating animation for Mac Studio */
      #loading-screen.loading-screen--desktop .pl-mac-container {
        animation: ls-float 4s ease-in-out infinite;
      }
      @keyframes ls-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      .pl-mac-container {
        perspective: 2000px;
        perspective-origin: center center;
      }
      .pl-macbook {
        position: relative;
        animation: pl-macbookOpen 1.5s ease-out forwards;
        transform-style: preserve-3d;
      }
      @keyframes pl-macbookOpen {
        0% { transform: rotateX(0deg) scale(0.85); opacity: 0; }
        30% { opacity: 1; }
        100% { transform: rotateX(0deg) scale(1); opacity: 1; }
      }
      .pl-bezel {
        position: relative;
        width: 800px;
        max-width: 92vw;
        height: 500px;
        max-height: 55vw;
        background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
        border-radius: 16px;
        padding: 12px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
      }
      .pl-camera {
        position: absolute;
        top: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: 6px;
        height: 6px;
        background: radial-gradient(circle, #4a5568 0%, #1a202c 70%);
        border-radius: 50%;
        z-index: 10;
        box-shadow: 0 0 4px rgba(0,0,0,0.5);
      }
      .pl-screen {
        position: relative;
        width: 100%;
        height: 100%;
        background: #000;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
      }
      .pl-base {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: linear-gradient(135deg, #1a0a0f 0%, #2d0d1a 50%, #1a0a0f 100%);
        animation: pl-baseAppear 0.1s ease-out 0.3s forwards;
        opacity: 0;
      }
      @keyframes pl-baseAppear {
        to { opacity: 1; }
      }
      .pl-glow {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 80%; height: 80%;
        background: radial-gradient(ellipse at center, rgba(122,31,61,0.35) 0%, transparent 70%);
        animation: pl-glowPulse 1.2s ease-in-out 0.5s forwards;
        opacity: 0;
      }
      @keyframes pl-glowPulse {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
        50% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.05); }
      }
      .pl-line {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent 0%, #7B1E3A 20%, #C8A951 50%, #7B1E3A 80%, transparent 100%);
        box-shadow: 0 0 20px rgba(200,169,81,0.5), 0 0 40px rgba(123,30,58,0.4);
        animation: pl-lineExpand 0.6s ease-out 1.1s forwards;
      }
      @keyframes pl-lineExpand {
        from { width: 0; opacity: 0; }
        to { width: 90%; max-width: 400px; opacity: 1; }
      }
      .pl-content {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        z-index: 10;
        width: 100%;
        max-width: 320px;
      }
      .pl-logo {
        width: 100px;
        height: auto;
        opacity: 0;
        animation: pl-logoFadeIn 0.8s ease-out 2s forwards;
        filter: drop-shadow(0 4px 20px rgba(200,169,81,0.35));
      }
      @keyframes pl-logoFadeIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }
      .pl-accent {
        width: 0;
        height: 2px;
        margin: 18px auto 12px;
        background: linear-gradient(90deg, transparent 0%, #C8A951 50%, transparent 100%);
        box-shadow: 0 0 12px rgba(200,169,81,0.5);
        animation: pl-accentExpand 0.5s ease-out 2.4s forwards;
      }
      @keyframes pl-accentExpand {
        to { width: 140px; opacity: 1; }
      }
      .pl-subtitle {
        color: #C8A951;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 2px;
        text-transform: uppercase;
        opacity: 0;
        animation: pl-textFadeIn 0.5s ease-out 2.6s forwards;
      }
      .pl-loading-text {
        color: rgba(200,169,81,0.7);
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 1px;
        margin-top: 6px;
        opacity: 0;
        animation: pl-textFadeIn 0.5s ease-out 2.8s forwards;
      }
      .pl-loading-bar {
        width: 120px;
        height: 3px;
        margin-top: 12px;
        background: rgba(200,169,81,0.2);
        border-radius: 999px;
        overflow: hidden;
        opacity: 0;
        animation: pl-textFadeIn 0.4s ease-out 3s forwards;
      }
      .pl-loading-bar::after {
        content: '';
        display: block;
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, #C8A951, #7B1E3A);
        border-radius: 999px;
        animation: pl-loadingBar 1.2s ease-in-out infinite;
      }
      @keyframes pl-loadingBar {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(200%); }
        100% { transform: translateX(-100%); }
      }
      @keyframes pl-textFadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      /* Mac Studio (desktop): stand + foot */
      .macstudio-loader .pl-base-bar {
        position: relative;
        width: 260px;
        max-width: 40vw;
        height: 40px;
        margin: 56px auto 0;
        background: linear-gradient(180deg, #4b5563 0%, #111827 100%);
        border-radius: 999px;
        box-shadow: 0 18px 45px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
      }
      .macstudio-loader .pl-base-bar::before {
        content: '';
        position: absolute;
        bottom: 36px;
        left: 50%;
        transform: translateX(-50%);
        width: 70px;
        height: 88px;
        background: linear-gradient(180deg, #4b5563 0%, #020617 100%);
        border-radius: 20px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.08);
      }
      .macstudio-loader .pl-keyboard,
      .macstudio-loader .pl-trackpad {
        display: none;
      }
      /* MacBook (mobile): laptop base bar with keyboard/trackpad */
      .macbook-loader .pl-base-bar {
        width: 840px;
        max-width: calc(92vw + 40px);
        height: 20px;
        margin: 0 auto;
        margin-top: 24px;
        background: linear-gradient(180deg, #2d3748 0%, #1a202c 100%);
        border-radius: 0 0 20px 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
        transform: translateY(-2px);
      }
      .macbook-loader .pl-base-bar::before {
        display: none;
      }
      .macbook-loader .pl-keyboard {
        display: block;
        position: absolute;
        top: 4px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        height: 8px;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.02) 20%, rgba(255,255,255,0.02) 80%, transparent 100%);
        border-radius: 2px;
      }
      .macbook-loader .pl-trackpad {
        display: block;
        position: absolute;
        bottom: 2px;
        left: 50%;
        transform: translateX(-50%);
        width: 100px;
        height: 4px;
        background: rgba(0,0,0,0.2);
        border-radius: 2px;
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
      }
      @media (max-width: 900px) {
        .pl-bezel { width: 90vw; height: 56.25vw; max-height: 437px; padding: 10px; }
        .macstudio-loader .pl-base-bar { width: min(220px, 45vw); height: 36px; }
        .macbook-loader .pl-base-bar { width: calc(90vw + 40px); }
        .pl-logo { width: 80px; }
      }
      @media (max-width: 640px) {
        .pl-bezel { width: 92vw; height: 57.5vw; padding: 8px; border-radius: 12px; }
        .macstudio-loader .pl-base-bar { width: min(200px, 55vw); height: 32px; border-radius: 999px; }
        .macbook-loader .pl-base-bar { width: calc(92vw + 24px); height: 16px; border-radius: 0 0 16px 16px; }
        .pl-camera { width: 4px; height: 4px; top: 4px; }
        .pl-logo { width: 70px; }
        .pl-subtitle { font-size: 10px; letter-spacing: 1.5px; }
        .pl-loading-text { font-size: 10px; }
      }
      @media (prefers-reduced-motion: reduce) {
        .pl-macbook, .pl-base, .pl-glow, .pl-line, .pl-logo, .pl-accent, .pl-subtitle, .pl-loading-text, .pl-loading-bar { animation: none; opacity: 1; }
        .pl-loading-bar::after { animation: none; transform: translateX(0); width: 100%; }
        #loading-screen.loading-screen--desktop .pl-mac-container { animation: none; }
        .pl-line { width: 90%; max-width: 400px; }
        .pl-accent { width: 140px; }
        #loading-screen { transition: opacity 0.3s ease-out; }
      }
    </style>
  </head>
  <body>
    <div id="loading-screen" role="status" aria-label="Loading">
      <div class="macbook-loader">
        <div class="pl-mac-container">
          <div class="pl-macbook">
            <div class="pl-bezel">
              <div class="pl-camera" aria-hidden></div>
              <div class="pl-screen">
                <div class="pl-base" aria-hidden></div>
                <div class="pl-glow" aria-hidden></div>
                <div class="pl-line" aria-hidden></div>
                <div class="pl-content">
                  <img src="/brand/stellenbosch/su-logo-primary.jpeg" alt="" class="pl-logo" width="100" height="100" />
                  <div class="pl-accent" aria-hidden></div>
                  <p class="pl-subtitle">Computer Science Division</p>
                  <p class="pl-loading-text">Loading...</p>
                  <div class="pl-loading-bar" aria-hidden></div>
                </div>
              </div>
            </div>
            <div class="pl-base-bar">
              <div class="pl-keyboard" aria-hidden></div>
              <div class="pl-trackpad" aria-hidden></div>
            </div>
          </div>
        </div>
      </div>
      <div class="macstudio-loader">
        <div class="pl-mac-container">
          <div class="pl-macbook">
            <div class="pl-bezel">
              <div class="pl-camera" aria-hidden></div>
              <div class="pl-screen">
                <div class="pl-base" aria-hidden></div>
                <div class="pl-glow" aria-hidden></div>
                <div class="pl-line" aria-hidden></div>
                <div class="pl-content">
                  <img src="/brand/stellenbosch/su-logo-primary.jpeg" alt="" class="pl-logo" width="100" height="100" />
                  <div class="pl-accent" aria-hidden></div>
                  <p class="pl-subtitle">Computer Science Division</p>
                  <p class="pl-loading-text">Loading...</p>
                  <div class="pl-loading-bar" aria-hidden></div>
                </div>
              </div>
            </div>
            <div class="pl-base-bar">
              <div class="pl-keyboard" aria-hidden></div>
              <div class="pl-trackpad" aria-hidden></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        var el = document.getElementById('loading-screen');
        if (!el) return;
        document.body.style.overflow = 'hidden';
        /* Viewport only: iPhone & mobile phones → MacBook Air; desktop/laptop → Mac Studio */
        var isMobile = window.innerWidth <= 1024;
        el.classList.add(isMobile ? 'loading-screen--mobile' : 'loading-screen--desktop');
        var start = Date.now();
        var MIN_LOADER_TIME = 5000;
        var FADEOUT_MS = 500;
        var MAX_WAIT = 12000;
        var done = false;
        function removeLoader() {
          if (done) return;
          done = true;
          el.classList.add('loading-screen--hide');
          setTimeout(function() {
            if (el.parentNode) el.parentNode.removeChild(el);
            document.body.style.overflow = '';
          }, FADEOUT_MS);
        }
        var elapsed = Date.now() - start;
        var remaining = Math.max(0, MIN_LOADER_TIME - elapsed);
        setTimeout(removeLoader, remaining);
        setTimeout(function() {
          if (!done && el.parentNode) {
            done = true;
            el.parentNode.removeChild(el);
            document.body.style.overflow = '';
          }
        }, MAX_WAIT);
      })();
    </script>
  </body>
</html>
